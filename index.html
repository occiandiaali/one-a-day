<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/oad-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>one-a-day</title>
    <link rel="stylesheet" href="src/style.css" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <script type="module">
      import van from "vanjs-core";
      import { MainPage } from "./src/main.js";
      import { AboutPage } from "./src/about.js";
      import { PolicyPage } from "./src/policy.js";
      import { DashboardPage } from "./src/dashboard.js";

      const { div, a, span } = van.tags;
      const route = van.state("main");

      window.addEventListener("hashchange", () => {
        const hash = location.hash.replace("#/", "");
        route.val = hash || "main";
      });

      const NavBar = div(
        { class: "nav-div" },
        a({ href: "#/main" }, "Home"),
        " | ",
        a({ href: "#/about" }, "About"),
        " | ",
        a({ href: "#/policy" }, "Policy"),
        " | ",
        a({ href: "#/dashboard" }, "Dashboard"),
      );

      const App = div(NavBar, () =>
        route.val === "main"
          ? MainPage
          : route.val === "about"
            ? AboutPage
            : route.val === "policy"
              ? PolicyPage
              : route.val === "dashboard"
                ? DashboardPage
                : span("Page not found"),
      );

      van.add(document.body, App);
    </script>
  </head>
  <!-- <body style="font-family: Arial, Helvetica, sans-serif; margin: 20px"></body> -->
  <body></body>
</html>
